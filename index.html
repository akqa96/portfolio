<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="إدارة الأصول">
<meta name="theme-color" content="#0d0d1a">
<title>إدارة الأصول</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0d1a}
#root{min-height:100%}
#splash{position:fixed;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:99999;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.sp{width:44px;height:44px;border:3px solid rgba(245,158,11,.2);border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="splash">
  <div class="sp"></div>
  <div style="color:#f59e0b;font-family:system-ui,sans-serif;font-size:15px;margin-top:4px">إدارة الأصول</div>
</div>
<div id="root"></div>

  return false;
};
</script>
