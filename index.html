<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="إدارة الأصول">
<meta name="theme-color" content="#0d0d1a">
<title>إدارة الأصول</title>




<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--a:#f59e0b;--a2:#d97706;--adim:rgba(245,158,11,.15);--adim2:rgba(245,158,11,.3);--bg:#0d0d1a;--bg2:#1a1a2e;--bg3:rgba(255,255,255,.05);--bg4:rgba(255,255,255,.03);--brd:rgba(255,255,255,.09);--brd2:rgba(255,255,255,.14);--txt:#fff;--txt2:#aaa;--txt3:#555;--inp:rgba(255,255,255,.08);--modal:#1a1a2e;--hdr:linear-gradient(135deg,#1a1a3e,#0d0d1a)}
body{font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:20px}
.hdr{background:var(--hdr);padding:13px 15px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--brd)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px;color:#000;font-weight:900;flex-shrink:0}
.logo-text{font-size:17px;font-weight:900}
.hdr-btns{display:flex;gap:6px}
.ico-btn{background:var(--bg3);border:1px solid var(--brd);color:var(--txt2);border-radius:10px;padding:6px 10px;font-size:14px;cursor:pointer;font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif}
.frow{display:flex;gap:5px;overflow-x:auto;padding:8px 0 6px;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fbtn{background:var(--bg3);color:var(--txt2);border:1px solid var(--brd);border-radius:20px;padding:4px 12px;font-size:11px;white-space:nowrap;cursor:pointer;font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;transition:all .2s}
.fbtn.on{background:var(--a);color:#000;font-weight:700;border-color:var(--a)}
.tabs{display:flex;overflow-x:auto;gap:0;border-bottom:1px solid var(--brd);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;background:none;border:none;border-bottom:2px solid transparent;padding:8px 13px 7px;color:var(--txt3);font-size:9px;cursor:pointer;font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s}
.tab.on{color:var(--a);border-bottom-color:var(--a)}
.tab-ic{font-size:13px}
.screen{display:none;padding:12px 13px 24px}
.screen.on{display:block;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card{background:var(--bg3);border:1px solid var(--brd);border-radius:13px;padding:13px 14px;margin-bottom:9px}
.row{display:flex;justify-content:space-between;align-items:center}
.sgrid{display:flex;gap:7px;margin-bottom:9px}
.sbox{background:var(--bg3);border:1px solid var(--brd);border-radius:12px;padding:11px 13px;flex:1;min-width:0}
.sl{font-size:10px;color:var(--txt2);margin-bottom:2px}
.sv{font-size:14px;font-weight:800;line-height:1.2}
.pos{color:#22c55e}.neg{color:#ef4444}.acc{color:var(--a)}.neu{color:var(--txt)}
.bdg{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
.bp{background:rgba(34,197,94,.13);color:#22c55e}
.bn{background:rgba(239,68,68,.13);color:#ef4444}
.bw{background:rgba(251,191,36,.13);color:#f59e0b}
.bi{background:rgba(96,165,250,.13);color:#60a5fa}
.ba{background:var(--adim);color:var(--a)}
.btn{border:none;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;white-space:nowrap;transition:all .15s}
.btn:active{opacity:.75}
.btn-p{background:var(--a);color:#000;flex:1}
.btn-s{background:var(--bg3);color:var(--txt);border:1px solid var(--brd);flex:1}
.btn-o{background:var(--adim);color:var(--a);border:1px solid var(--adim2)}
.btn-d{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.btn-sell{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);flex:1}
.brow{display:flex;gap:6px;margin-top:9px}
.inp{width:100%;background:var(--inp);border:1px solid var(--brd2);border-radius:8px;padding:8px 11px;color:var(--txt);font-size:13px;text-align:right;font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;outline:none}
.inp:focus{border-color:var(--a)}
.sel{width:100%;background:var(--inp);border:1px solid var(--brd2);border-radius:8px;padding:8px 11px;color:var(--txt);font-size:13px;font-family:-apple-system,system-ui,'Helvetica Neue',Arial,sans-serif;outline:none}
.sel option{background:var(--modal)}
.fld{margin-bottom:10px}
.lbl{font-size:11px;color:var(--txt2);margin-bottom:3px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.mdl{background:var(--modal);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px;padding-bottom:env(safe-area-inset-bottom,36px);border-top:1px solid var(--brd);max-height:88vh;overflow-y:auto}
.mdl-t{font-size:16px;font-weight:700;margin-bottom:14px}
.mg{display:flex;gap:5px;margin-top:7px}
.mb{flex:1;background:var(--bg4);border-radius:7px;padding:6px 7px}
.ml{font-size:9px;color:var(--txt3)}.mv{font-size:10px;font-weight:600;margin-top:1px}
.pw{height:5px;border-radius:3px;background:var(--brd);margin-top:5px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .4s}
.nw{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.03));border:1px solid rgba(245,158,11,.3);border-radius:16px;padding:18px 16px;margin-bottom:10px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg4);border-radius:8px;margin-bottom:5px}
.dvd{height:1px;background:var(--brd);margin:14px 0}
.ibdg{display:inline-flex;align-items:center;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tsw{width:42px;height:23px;border-radius:12px;background:rgba(255,255,255,.15);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;display:inline-block;vertical-align:middle}
.tsw.on{background:var(--a)}
.tknob{position:absolute;top:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:right .2s;right:21px}
.tsw.on .tknob{right:2px}
.drow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.dchk{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg4);border-radius:9px;margin-bottom:6px;cursor:pointer;border:1px solid var(--brd);transition:all .15s}
.dchk.on{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3)}
.chk-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--brd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.dchk.on .chk-box{background:#ef4444;border-color:#ef4444;color:#fff}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-dot">◈</div>
      <div>
        <div style="font-size:9px;color:var(--a);letter-spacing:1.5px">ASSET MANAGEMENT</div>
        <div class="logo-text">إدارة الأصول</div>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="ico-btn" onclick="openInvMgr()">👥</button>
      <button class="ico-btn" onclick="ST('settings')">⚙</button>
    </div>
  </div>
  <div class="frow" id="frow"></div>
  <div class="tabs" id="tabs"></div>
</div>

<div id="s-dashboard"  class="screen on"></div>
<div id="s-stocks"     class="screen"></div>
<div id="s-realestate" class="screen"></div>
<div id="s-projects"   class="screen"></div>
<div id="s-other"      class="screen"></div>
<div id="s-income"     class="screen"></div>
<div id="s-assets"     class="screen"></div>
<div id="s-goals"      class="screen"></div>
<div id="s-settings"   class="screen"></div>

<div class="ov" id="ov"><div class="mdl" id="mdl"></div></div>
<div class="ov" id="ovc">
  <div class="mdl" style="max-height:unset">
    <div id="cv-msg" style="font-size:15px;font-weight:700;text-align:center;margin-bottom:16px"></div>
    <div class="brow">
      <button class="btn btn-d" style="flex:1" id="cv-ok">تأكيد</button>
      <button class="btn btn-s" onclick="CC()">إلغاء</button>
    </div>
  </div>
</div>

<script>
var D,CT='dashboard',_ccb=null;
var KEY='inv_pf_v6';

function load(){try{var d=localStorage.getItem(KEY);return d?JSON.parse(d):def();}catch(e){return def();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){}}

function def(){return{
  currency:'QAR',filter:'الكل',
  investors:[
    {id:1,name:'أحمد',color:'#f59e0b'},
    {id:2,name:'خالد',color:'#34d399'},
    {id:3,name:'محمد',color:'#818cf8'}
  ],
  stocks:[
    {id:1,iid:1,name:'أرامكو السعودية',sym:'2222',mkt:'SA',qty:5000,price:28.4,
     trades:[{id:1,date:'2023-01-15',qty:5000,price:24,note:''}],sells:[],divs:[]},
    {id:2,iid:2,name:'بنك قطر الوطني',sym:'QNBK',mkt:'QA',qty:3000,price:18.2,
     trades:[{id:1,date:'2023-03-01',qty:3000,price:16.5,note:''}],sells:[],
     divs:[{id:1,date:'2023-12-01',amount:9000,note:'توزيع سنوي'}]}
  ],
  re:[
    {id:1,iid:1,name:'شقة العليا',type:'شقة سكنية',value:920000,cost:800000,
     rented:true,rent:8000,ls:'2024-01-01',le:'2024-12-31',inc:[],exp:[]},
    {id:2,iid:2,name:'أرض النرجس',type:'أرض',value:1500000,cost:1200000,
     rented:false,rent:0,ls:'',le:'',inc:[],exp:[]}
  ],
  pr:[
    {id:1,iid:1,name:'مجمع تجاري - الرياض',value:3200000,cost:3000000,
     inc:[{id:1,label:'إيجارات Q1',amount:120000,date:'2024-03-31'}]}
  ],
  oth:[
    {id:1,iid:1,name:'ذهب مسبوكات',cat:'gold',value:30000},
    {id:2,iid:2,name:'ادخار بنكي',cat:'cash',value:150000}
  ],
  goals:[
    {id:1,label:'هدف دخل شهري أحمد',type:'income',iid:1,target:50000,deadline:'2025-12-31'}
  ]
};}

D=load();

// UTILS
function fmt(n){var s=D.currency==='USD'?'$':'ر.ق';return s+' '+Math.abs(Math.round(n||0)).toLocaleString('ar-SA');}
function pct(a,b){return a?(((b-a)/a)*100).toFixed(1):'0.0';}
function gi(id){return D.investors.find(function(x){return x.id===id;})||{name:'?',color:'#888',id:0};}
function sv(id){return (document.getElementById(id)||{}).value||'';}
function stkV(s){return(s.qty||0)*(s.price||0);}
function stkC(s){return(s.trades||[]).reduce(function(a,t){return a+t.qty*t.price;},0);}
function stkD(s){return(s.divs||[]).reduce(function(a,d){return a+d.amount;},0);}
function reInc(r){return r.rented?r.rent*12:0;}
function reNet(r){return reInc(r)+(r.inc||[]).reduce(function(a,x){return a+x.amount;},0)-(r.exp||[]).reduce(function(a,x){return a+x.amount;},0);}
function fil(arr){
  if(D.filter==='الكل')return arr;
  var inv=D.investors.find(function(x){return x.name===D.filter;});
  return inv?arr.filter(function(x){return x.iid===inv.id;}):arr;
}
function ibdg(inv){return '<span class="ibdg" style="background:'+inv.color+'22;color:'+inv.color+'">'+inv.name+'</span>';}

// TABS
var TABS=[
  {id:'dashboard',l:'الرئيسية',ic:'◈'},
  {id:'stocks',l:'الأسهم',ic:'▲'},
  {id:'realestate',l:'العقارات',ic:'⬡'},
  {id:'projects',l:'المشاريع',ic:'◉'},
  {id:'other',l:'أخرى',ic:'◆'},
  {id:'income',l:'الأرباح',ic:'＄'},
  {id:'assets',l:'الأصول',ic:'⬤'},
  {id:'goals',l:'الأهداف',ic:'◎'},
  {id:'settings',l:'الإعدادات',ic:'⚙'}
];

function RT(){
  document.getElementById('tabs').innerHTML=TABS.map(function(t){
    return '<button class="tab'+(CT===t.id?' on':'')+'" onclick="ST(\''+t.id+'\')">'
      +'<span class="tab-ic">'+t.ic+'</span><span>'+t.l+'</span></button>';
  }).join('');
}

function ST(id){
  CT=id;
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  var sc=document.getElementById('s-'+id);
  if(sc)sc.classList.add('on');
  RT(); RS(id);
}

// FILTER
function RF(){
  var ns=['الكل'].concat(D.investors.map(function(i){return i.name;}));
  document.getElementById('frow').innerHTML=ns.map(function(n){
    return '<button class="fbtn'+(D.filter===n?' on':'')+'" onclick="SF(\''+n+'\')">'+ n+'</button>';
  }).join('');
}
function SF(n){D.filter=n;save();RF();RS(CT);}

// RENDER
function RS(id){
  var m={dashboard:RD,stocks:RStk,realestate:RRE,projects:RPR,other:ROth,income:RInc,assets:RAs,goals:RGl,settings:RSt};
  if(m[id])m[id]();
}

// CONFIRM
function AC(msg,cb){
  document.getElementById('cv-msg').textContent=msg;
  _ccb=cb;
  document.getElementById('ovc').classList.add('on');
  document.getElementById('cv-ok').onclick=function(){document.getElementById('ovc').classList.remove('on');if(_ccb)_ccb();};
}
function CC(){document.getElementById('ovc').classList.remove('on');}

// MODAL
function OM(html){document.getElementById('mdl').innerHTML=html;document.getElementById('ov').classList.add('on');}
function CM(){document.getElementById('ov').classList.remove('on');}

// ═══ DASHBOARD ═══
function RD(){
  try {
  var sV=D.stocks.reduce(function(s,x){return s+stkV(x);},0);
  var sC=D.stocks.reduce(function(s,x){return s+stkC(x);},0);
  var rV=D.re.reduce(function(s,x){return s+x.value;},0);
  var rC=D.re.reduce(function(s,x){return s+x.cost;},0);
  var pV=D.pr.reduce(function(s,x){return s+x.value;},0);
  var pC=D.pr.reduce(function(s,x){return s+x.cost;},0);
  var oV=D.oth.reduce(function(s,x){return s+x.value;},0);
  var nw=sV+rV+pV+oV;
  var tC=sC+rC+pC;
  var g=nw-tC;
  var ann=D.stocks.reduce(function(s,x){return s+stkD(x);},0)
        +D.re.reduce(function(s,x){return s+reNet(x);},0)
        +D.pr.reduce(function(s,x){return s+(x.inc||[]).reduce(function(a,i){return a+i.amount;},0);},0);

  var html='<div class="nw">'
    +'<div style="font-size:11px;color:var(--a);margin-bottom:4px">صافي الثروة</div>'
    +'<div style="font-size:26px;font-weight:900">'+fmt(nw)+'</div>'
    +'<div style="display:flex;gap:16px;margin-top:8px;flex-wrap:wrap">'
    +'<div><div style="font-size:10px;color:var(--txt3)">الاستثمار</div><div style="font-size:13px;font-weight:700;color:var(--txt2)">'+fmt(tC)+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--txt3)">الأرباح</div><div style="font-size:13px;font-weight:700;color:'+(g>=0?'#22c55e':'#ef4444')+'">'+(g>=0?'+':'')+fmt(g)+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--txt3)">الدخل السنوي</div><div style="font-size:13px;font-weight:700;color:var(--a)">'+fmt(ann)+'</div></div>'
    +'</div></div>';

  html+='<div class="sgrid">'
    +'<div class="sbox"><div class="sl">الدخل السنوي</div><div class="sv acc">'+fmt(ann)+'</div></div>'
    +'<div class="sbox"><div class="sl">متوسط شهري</div><div class="sv pos">'+fmt(Math.round(ann/12))+'</div></div>'
    +'</div>';

  // Simple bars instead of SVG donut
  var tot=nw||1;
  var segs=[{l:'أسهم',v:sV,c:'#60a5fa',ic:'▲'},{l:'عقارات',v:rV,c:'#a78bfa',ic:'⬡'},{l:'مشاريع',v:pV,c:'#f59e0b',ic:'◉'},{l:'أخرى',v:oV,c:'#34d399',ic:'◆'}];
  html+='<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">توزيع الأصول</div>';
  segs.forEach(function(s){
    if(!s.v)return;
    var pct_val=Math.round(s.v/tot*100);
    html+='<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
      +'<span style="font-size:12px;color:'+s.c+'">'+s.ic+' '+s.l+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:'+s.c+'">'+pct_val+'% — '+fmt(s.v)+'</span>'
      +'</div>'
      +'<div style="height:8px;border-radius:4px;background:var(--brd);overflow:hidden">'
      +'<div style="height:100%;border-radius:4px;background:'+s.c+';width:'+pct_val+'%"></div>'
      +'</div></div>';
  });
  html+='</div>';

  segs.forEach(function(s){
    var cost=s.l==='أسهم'?sC:s.l==='عقارات'?rC:s.l==='مشاريع'?pC:oV;
    var p=s.v-cost;
    if(!s.v)return;
    html+='<div class="card"><div class="row">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div style="width:36px;height:36px;border-radius:10px;background:'+s.c+'22;color:'+s.c+';font-size:15px;display:flex;align-items:center;justify-content:center">'+s.ic+'</div>'
      +'<div><div style="font-weight:700;font-size:14px">'+s.l+'</div>'
      +'<div style="font-size:11px;color:var(--txt2)">'+fmt(cost)+'</div></div></div>'
      +'<div style="text-align:left"><div style="font-weight:700;font-size:13px;color:'+(p>=0?'#22c55e':'#ef4444')+'">'+(p>=0?'+':'')+fmt(p)+'</div></div>'
      +'</div></div>';
  });

  document.getElementById('s-dashboard').innerHTML=html;
  } catch(err) {
    document.getElementById('s-dashboard').innerHTML='<div style="padding:20px;color:#ef4444;font-size:13px">خطأ: '+err.message+'</div>';
  }
}

// ═══ STOCKS ═══
function RStk(){
  var items=fil(D.stocks);
  var tV=D.stocks.reduce(function(s,x){return s+stkV(x);},0);
  var tC=D.stocks.reduce(function(s,x){return s+stkC(x);},0);
  var tD=D.stocks.reduce(function(s,x){return s+stkD(x);},0);

  var html='<div class="sgrid">'
    +'<div class="sbox"><div class="sl">القيمة الحالية</div><div class="sv acc">'+fmt(tV)+'</div></div>'
    +'<div class="sbox"><div class="sl">الربح الرأسمالي</div><div class="sv '+(tV>=tC?'pos':'neg')+'">'+(tV>=tC?'+':'')+fmt(tV-tC)+'</div>'
    +'<div style="font-size:10px;margin-top:2px" class="'+(tV>=tC?'pos':'neg')+'">'+(tV>=tC?'+':'')+pct(tC,tV)+'%</div></div>'
    +'</div>';
  html+='<div class="sgrid" style="margin-bottom:10px">'
    +'<div class="sbox"><div class="sl">أرباح موزعة</div><div class="sv acc">'+fmt(tD)+'</div></div>'
    +'<div class="sbox"><div class="sl">عدد الأسهم</div><div class="sv neu">'+D.stocks.length+'</div></div>'
    +'</div>';

  html+='<div class="sec-hdr"><span style="font-size:12px;color:var(--txt2)">'+items.length+' سهم</span>'
    +'<div style="display:flex;gap:6px">'
    +'<button class="btn btn-d" style="padding:5px 10px;font-size:11px" onclick="DP(\'stocks\')">حذف</button>'

      var si=g.iid?D.stocks.filter(function(s){return s.iid===g.iid;}):D.stocks;

      +'<div style="height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a),var(--a2));width:'+p.toFixed(1)+'%;transition:width .5s"></div>'

      +'<div class="mb"><div class="ml">المتبقي</div><div class="mv '+(rem?'neg':'pos')+'">'+(rem?fmt(rem):'✓ مكتمل')+'</div></div>'
      +(days!==null?'<div class="mb"><div class="ml">الأيام</div><div class="mv '+(days<30?'neg':'neu')+'">'+(days>0?days+' يوم':'انتهى')+'</div></div>':'')
      +'</div></div>';
  });
  if(!D.goals.length)html+='<div style="text-align:center;padding:40px;color:var(--txt3)">لا توجد أهداف</div>';

    +'<button class="btn btn-s" onclick="CM()">إلغاء</button></div>';

var _dsel={};
function TDS(id,sec){
  if(!_dsel[sec])_dsel[sec]=[];
  var i=_dsel[sec].indexOf(id);
  if(i>-1){_dsel[sec].splice(i,1);}else{_dsel[sec].push(id);}
  var el=document.getElementById('dc'+id);
  var cb=document.getElementById('cb'+id);
  if(el&&cb){
    var on=_dsel[sec].indexOf(id)>-1;
    el.className='dchk'+(on?' on':'');
    cb.textContent=on?'✓':'';
  }
}
function CDS(sec){
  var ids=_dsel[sec]||[];
  if(!ids.length)return;
  AC('حذف '+ids.length+' عنصر؟',function(){
    D[sec]=D[sec].filter(function(x){return ids.indexOf(x.id)===-1;});
    _dsel[sec]=[];save();CM();
    var m={stocks:RStk,re:RRE,pr:RPR,oth:ROth};if(m[sec])m[sec]();
  });
}

  });
  html+='<button class="btn btn-o" style="width:100%;margin-top:4px" onclick="NIM()">+ إضافة مستثمر</button>'
    +'<button class="btn btn-s" style="width:100%;margin-top:8px" onclick="CM()">إغلاق</button>';
  OM(html);
}
function DIM(id){AC('حذف هذا المستثمر؟',function(){D.investors=D.investors.filter(function(x){return x.id!==id;});save();openInvMgr();RS(CT);RF();});}
function NIM(){
  var COLS=['#f59e0b','#34d399','#818cf8','#fb7185','#38bdf8','#f97316','#a3e635','#e879f9'];
  OM('<div class="mdl-t">إضافة مستثمر</div>'
    +'<div class="fld"><div class="lbl">الاسم</div><input class="inp" id="in" placeholder="اسم المستثمر"></div>'
    +'<div class="fld"><div class="lbl">اللون</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">'
    +COLS.map(function(c){return '<div onclick="selIC(\''+c+'\')" id="ic'+c.replace('#','')+'" style="width:24px;height:24px;border-radius:50%;background:'+c+';cursor:pointer;border:2px solid transparent;transition:transform .15s" onmouseover="this.style.transform=\'scale(1.15)\'" onmouseout="this.style.transform=\'none\'"></div>';}).join('')
    +'</div></div>'
    +'<input type="hidden" id="ic" value="#f59e0b">'
    +'<div class="brow"><button class="btn btn-p" onclick="CAIM()">إضافة</button><button class="btn btn-s" onclick="openInvMgr()">رجوع</button></div>');
}
function selIC(c){
  document.getElementById('ic').value=c;
  document.querySelectorAll('[id^="ic"]').forEach(function(el){if(el.tagName==='DIV')el.style.border='2px solid transparent';});
  var el=document.getElementById('ic'+c.replace('#',''));
  if(el)el.style.border='2px solid var(--txt)';
}
function CAIM(){
  var n=sv('in'),c=sv('ic');if(!n)return;
  D.investors.push({id:Date.now(),name:n,color:c||'#f59e0b'});
  save();RF();openInvMgr();RS(CT);
}
function EIM(id){
  var inv=gi(id);
  var COLS=['#f59e0b','#34d399','#818cf8','#fb7185','#38bdf8','#f97316','#a3e635','#e879f9'];
  OM('<div class="mdl-t">تعديل المستثمر</div>'
    +'<div class="fld"><div class="lbl">الاسم</div><input class="inp" id="en" value="'+inv.name+'"></div>'
    +'<div class="fld"><div class="lbl">اللون</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">'
    +COLS.map(function(c){return '<div onclick="selEC(\''+c+'\')" id="ec'+c.replace('#','')+'" style="width:24px;height:24px;border-radius:50%;background:'+c+';cursor:pointer;border:2px solid '+(c===inv.color?'var(--txt)':'transparent')+'"></div>';}).join('')
    +'</div></div>'
    +'<input type="hidden" id="ec" value="'+inv.color+'">'
    +'<div class="brow"><button class="btn btn-p" onclick="SEIM('+id+')">حفظ</button><button class="btn btn-s" onclick="openInvMgr()">إلغاء</button></div>');
}
function selEC(c){
  document.getElementById('ec').value=c;
  document.querySelectorAll('[id^="ec"]').forEach(function(el){if(el.tagName==='DIV')el.style.border='2px solid transparent';});
  var el=document.getElementById('ec'+c.replace('#',''));
  if(el)el.style.border='2px solid var(--txt)';
}
function SEIM(id){
  var n=sv('en'),c=sv('ec');if(!n)return;
  var inv=D.investors.find(function(x){return x.id===id;});
  if(inv){inv.name=n;inv.color=c;}
  save();RF();openInvMgr();RS(CT);
}

document.getElementById('s-dashboard').innerHTML = '<div style="padding:20px;color:#f59e0b;font-size:14px">جاري التحميل...</div>';
try {
  RT();
} catch(e) { document.getElementById('s-dashboard').innerHTML += '<div style="color:#ef4444">RT خطأ: '+e.message+'</div>'; }
try {
  RF();
} catch(e) { document.getElementById('s-dashboard').innerHTML += '<div style="color:#ef4444">RF خطأ: '+e.message+'</div>'; }
try {
  RD();
} catch(e) {
  document.getElementById('s-dashboard').innerHTML = '<div style="padding:20px;color:#ef4444;font-size:13px">RD خطأ: ' + e.message + '<br>Line: ' + e.stack + '</div>';
}
</script>
