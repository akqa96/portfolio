  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  :root{--a:#f59e0b;--a2:#d97706;--a-dim:rgba(245,158,11,.13);--a-dim2:rgba(245,158,11,.28);--a-glow:rgba(245,158,11,.2)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  html{height:100%;-webkit-text-size-adjust:100%}

  body{
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    min-height:-webkit-fill-available;
    padding-bottom:env(safe-area-inset-bottom,20px);
    max-width:700px;
    margin:0 auto;
    transition:background .3s,color .3s;
    direction:rtl;
    position:relative;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{content:'';position:fixed;top:-150px;right:-80px;width:350px;height:350px;background:radial-gradient(circle,rgba(245,158,11,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;bottom:-150px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(96,165,250,.05) 0%,transparent 70%);pointer-events:none;z-index:0}

  input,select,button,textarea{font-family:'Cairo',sans-serif;direction:rtl;outline:none;-webkit-appearance:none}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  input[type=date]{color-scheme:inherit;-webkit-appearance:none}
  ::-webkit-scrollbar{width:0;height:0}

  /* \u2500\u2500 SCREENS \u2500\u2500 */
  .screen{display:none;padding:12px 13px;padding-bottom:calc(28px + env(safe-area-inset-bottom,0px));animation:fu .25s ease;direction:rtl;position:relative;z-index:1}
  .screen.active{display:block}
  @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .anim-num{animation:countUp .5s ease forwards}

  /* \u2500\u2500 HEADER \u2500\u2500 */
  .hdr{
    background:var(--hdr);
    padding:calc(13px + env(safe-area-inset-top,0px)) 15px 0;
    border-bottom:1px solid var(--brd);
    position:sticky;top:0;z-index:100;
    direction:rtl;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
  }
  .hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .hdr-acts{display:flex;gap:6px;align-items:center}
  .ico-btn{
    background:var(--glass);border:1px solid var(--brd);color:var(--txt2);
    border-radius:10px;padding:8px 12px;font-size:15px;cursor:pointer;
    transition:all .15s;backdrop-filter:blur(8px);
    min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center;
  }
  .ico-btn:active{opacity:.7;transform:scale(.94)}
  .logo-dot{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:17px;color:#000;box-shadow:0 0 16px var(--a-glow);flex-shrink:0}
  .frow{display:flex;gap:5px;overflow-x:auto;padding:8px 0 6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .frow::-webkit-scrollbar{display:none}
  .fbtn{
    background:var(--glass);color:var(--txt2);border:1px solid var(--brd);
    border-radius:20px;padding:6px 14px;font-size:12px;white-space:nowrap;
    flex-shrink:0;cursor:pointer;transition:all .2s;
    min-height:34px;
  }
  .fbtn.on{background:var(--a);color:#000;font-weight:700;border-color:var(--a);box-shadow:0 2px 12px var(--a-glow)}
  .btabs{display:none}
  .htabs{display:flex;gap:0;overflow-x:auto;margin-top:6px;border-bottom:1px solid var(--brd);scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .htabs::-webkit-scrollbar{display:none}
  .tbb{
    flex:0 0 auto;background:none;border:none;border-bottom:2px solid transparent;
    padding:9px 14px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;
    color:var(--txt3);cursor:pointer;transition:all .2s;white-space:nowrap;
    min-height:44px;
  }
  .tbb.on{color:var(--a);border-bottom-color:var(--a)}
  .tbb .ti{font-size:15px}.tbb .tl{font-size:9px;font-weight:600}
  .tdot{width:3px;height:3px;border-radius:50%;background:var(--a);opacity:0;margin-top:1px}
  .tbb.on .tdot{opacity:1}

  /* \u2500\u2500 GLASSMORPHISM CARDS \u2500\u2500 */
  .card{background:var(--glass);border:1px solid var(--brd);border-radius:16px;padding:14px 15px;margin-bottom:10px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle at top right,var(--card-glow,rgba(255,255,255,.02)) 0%,transparent 70%);pointer-events:none}
  .sgrid{display:flex;gap:7px;margin-bottom:9px}
  .sbox{background:var(--glass);border:1px solid var(--brd);border-radius:13px;padding:12px 13px;flex:1;min-width:0;backdrop-filter:blur(8px)}
  .sl{font-size:10px;color:var(--txt2);margin-bottom:2px;letter-spacing:.3px}
  .sv{font-size:14px;font-weight:800;line-height:1.2;color:var(--txt)}
  .ss{font-size:10px;margin-top:2px}
  .pos{color:#22c55e}.neg{color:#ef4444}.neu{color:var(--txt)}.acc{color:var(--a)}
  .bdg{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
  .bp{background:rgba(34,197,94,.12);color:#22c55e}
  .bn{background:rgba(239,68,68,.12);color:#ef4444}
  .bw{background:rgba(251,191,36,.12);color:#f59e0b}
  .bi{background:rgba(96,165,250,.12);color:#60a5fa}
  .ba{background:var(--a-dim);color:var(--a)}

  /* \u2500\u2500 NET WORTH HERO CARD \u2500\u2500 */
  .nw-hero{background:linear-gradient(135deg,rgba(245,158,11,.1) 0%,rgba(245,158,11,.03) 50%,rgba(96,165,250,.05) 100%);border:1px solid rgba(245,158,11,.22);border-radius:20px;padding:20px 16px;margin-bottom:10px;position:relative;overflow:hidden}
  .nw-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(245,158,11,.15) 0%,transparent 70%);pointer-events:none}
  .nw-label{font-size:10px;color:var(--a);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
  .nw-amount{font-size:28px;font-weight:900;color:var(--txt);line-height:1;margin-bottom:6px}

  @media(min-width:600px){

  .brow{display:flex;gap:6px;margin-top:9px}
  .btn{
    border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;
    cursor:pointer;font-family:'Cairo',sans-serif;transition:all .15s;white-space:nowrap;
    min-height:44px;display:inline-flex;align-items:center;justify-content:center;
  }
  .btn:active{opacity:.75;transform:scale(.97)}
  .bp2{background:var(--a);color:#000;flex:1}
  .bs2{background:var(--glass);color:var(--txt);border:1px solid var(--brd);flex:1}
  .bd2{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
  .bo2{background:var(--a-dim);color:var(--a);border:1px solid var(--a-dim2)}
  .inp{
    width:100%;background:var(--inp);border:1px solid var(--brd2);border-radius:9px;
    padding:11px 13px;color:var(--txt);font-size:15px;text-align:right;
    transition:border .2s,box-shadow .2s;
    min-height:44px;
  }
  .inp:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a-dim)}
  .sel{
    width:100%;background:var(--inp);border:1px solid var(--brd2);border-radius:9px;
    padding:11px 13px;color:var(--txt);font-size:15px;
    min-height:44px;
  }
  .sel option{background:var(--modal);color:var(--txt)}
  .lbl{font-size:12px;color:var(--txt2);margin-bottom:4px}
  .fld{margin-bottom:12px}
  .t2s{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .t2s::-webkit-scrollbar{display:none}
  .t2{
    flex:1;background:var(--bg4);color:var(--txt2);border:1px solid var(--brd);
    border-radius:8px;padding:8px 4px;font-size:11px;cursor:pointer;
    font-family:'Cairo',sans-serif;transition:all .2s;white-space:nowrap;
    min-height:38px;flex-shrink:0;
  }
  .t2.on{background:var(--a-dim);color:var(--a);border-color:var(--a-dim2);font-weight:700}
  .ov{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
    z-index:300;align-items:flex-end;justify-content:center;
    direction:rtl;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .ov.op{display:flex}
  .mdl{
    background:var(--modal);border-radius:22px 22px 0 0;
    width:100%;max-width:700px;
    padding:20px;
    padding-bottom:calc(36px + env(safe-area-inset-bottom,0px));
    border-top:1px solid var(--brd);max-height:88vh;overflow-y:auto;
    direction:rtl;-webkit-overflow-scrolling:touch;
  }
  .mdl-t{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--txt)}
  .sec-t{font-size:12px;color:var(--txt2);margin-bottom:8px;margin-top:2px;letter-spacing:.3px}
  .dvd{height:1px;background:var(--brd);margin:14px 0}
  .swrap{background:var(--inp);border:1px solid var(--brd);border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:7px;margin-bottom:11px}
  .swrap input{background:none;border:none;color:var(--txt);font-size:15px;flex:1;font-family:'Cairo',sans-serif;direction:rtl;min-height:24px}
  .swrap input::placeholder{color:var(--txt3)}
  .sitem{padding:12px 13px;border-bottom:1px solid var(--brd);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s;color:var(--txt);min-height:48px}
  .sitem:hover,.sitem:active{background:var(--glass)}
  .tsw{width:46px;height:26px;border-radius:13px;background:var(--brd2);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
  .tsw.on{background:var(--a)}
  .tknob{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:right .2s;right:24px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .tsw.on .tknob{right:3px}
  .av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;flex-shrink:0}
  .cdot{border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent;min-width:28px;min-height:28px}
  .cdot:hover{transform:scale(1.15)}
  .cdot.sel{outline:2px solid var(--txt);outline-offset:2px}
  .goal-bar{height:8px;border-radius:4px;background:var(--brd);overflow:hidden;margin:6px 0}
  .goal-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a),var(--a2));transition:width .6s cubic-bezier(.4,0,.2,1)}
  .irow{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:var(--bg4);border-radius:10px;margin-bottom:6px;transition:background .15s;min-height:44px}
  .chip{background:var(--bg4);border:1px solid var(--brd);border-radius:12px;padding:10px 12px;margin-bottom:7px}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .pchip{background:var(--glass);border:1px solid var(--brd);border-radius:13px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;min-height:52px}
